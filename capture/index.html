<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>拍照分類 | Garage Photo Workbench</title>
  <link rel="stylesheet" href="../static/theme.css">
  <script src="../static/runtime-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script type="module" src="../static/capture.js"></script>
</head>
<body class="page-capture">
  <header class="topbar">
    <a class="back-link" href="../">← 返回首頁</a>
  </header>

  <main class="capture-shell">
    <section class="capture-hero">
      <p class="eyebrow">Mobile Capture Flow</p>
      <h1>先拍車，再標記改了什麼</h1>
    </section>

    <form class="capture-stack" id="captureForm">
      <section class="capture-card">
        <div class="section-head">
          <div>
            <h2>第一步：拍車輛照</h2>
            <p>只可上傳一張車輛照。</p>
          </div>
        </div>

        <label class="upload-zone large" for="vehicleInput">
          <input id="vehicleInput" type="file" accept="image/*" capture="environment">
          <strong>按一下拍照或上傳車輛照</strong>
          <small>手機會優先開相機；如需更換，先移除現有相片。</small>
        </label>

        <div class="preview-grid" id="vehiclePreview"></div>
      </section>

      <section class="capture-card">
        <div class="section-head">
          <div>
            <h2>第二步：選擇車輛品牌</h2>
            <p>暫時放 6 個品牌，之後可以再加入更多。</p>
          </div>
        </div>
        <div class="choice-grid brand-grid" id="brandGrid"></div>
      </section>

      <section class="capture-card">
        <div class="section-head">
          <div>
            <h2>第三步：加入配件 / 維修項目</h2>
            <p>每個項目只可上傳一張相片，要再加入相片請按加入更多配件。</p>
          </div>
          <button class="secondary-button" id="addAccessoryBtn" type="button">加入更多配件</button>
        </div>

        <div class="accessory-stack" id="accessoryList"></div>
      </section>
    </form>
  </main>

  <footer class="sticky-actionbar">
    <div class="actionbar-row">
      <button class="primary-button" id="saveSetBtn" type="submit" form="captureForm">完成</button>
    </div>
    <p class="status-text" id="captureStatus">上方流程會在完成後把車輛照、品牌與配件項目一併儲存。</p>
  </footer>
</body>
</html>

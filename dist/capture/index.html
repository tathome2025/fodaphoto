<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>安裝維修保養 | FODA工場流程</title>
  <script src="../static/runtime-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script type="module" crossorigin src="../assets/capture-DZEUv1nu.js"></script>
  <link rel="modulepreload" crossorigin href="../assets/workbench-VwRDttHn.js">
  <link rel="stylesheet" crossorigin href="../assets/workbench-M26Cyyw7.css">
</head>
<body class="page-capture">
  <header class="topbar">
    <a class="back-link" href="../">← 返回首頁</a>
    <div class="topbar-links">
      <a class="secondary-link" href="../checkin/">前往 Check-in</a>
      <a class="secondary-link" href="../checkout/">前往 Check out</a>
      <span class="account-pill">使用帳號：<strong id="currentUserEmail">-</strong></span>
    </div>
  </header>

  <main class="capture-shell">
    <section class="capture-hero">
      <p class="eyebrow">FODA Workflow</p>
      <h1>安裝維修保養</h1>
    </section>

    <form class="capture-stack" id="captureForm">
      <section class="capture-card">
        <div class="section-head">
          <div>
            <h2>第一步：選擇已 Check-in 車輛</h2>
          </div>
        </div>

        <div class="vehicle-selector-grid" id="checkInVehicleList"></div>
      </section>

      <section class="capture-card">
        <div class="section-head">
          <div>
            <h2>第二步：新增安裝維修保養項目</h2>
          </div>
        </div>

        <div class="accessory-stack" id="accessoryList"></div>

        <div class="lookup-creator">
          <label for="customServiceInput">未有的項目</label>
          <div class="lookup-creator-row">
            <input id="customServiceInput" type="text" placeholder="例如：冷氣系統、電池、玻璃鍍膜">
            <button class="secondary-button" id="addServiceItemBtn" type="button">加入項目</button>
          </div>
          <p class="muted-copy">新項目會寫入紀錄，所有帳號都可直接選用。</p>
        </div>
      </section>
    </form>
  </main>

  <div class="camera-overlay" id="cameraOverlay" hidden>
    <div class="camera-shell">
      <div class="camera-head">
        <strong id="cameraTitle">拍照</strong>
        <button class="tiny-button" id="closeCameraBtn" type="button">關閉</button>
      </div>
      <div class="camera-stage">
        <video id="cameraVideo" autoplay playsinline muted></video>
        <canvas id="cameraCanvas" hidden></canvas>
      </div>
      <div class="camera-actions">
        <button class="secondary-button" id="cancelCameraBtn" type="button">取消</button>
        <button class="primary-button" id="shutterCameraBtn" type="button">拍照</button>
      </div>
    </div>
  </div>

  <footer class="sticky-actionbar">
    <div class="actionbar-row">
      <button class="secondary-button" id="addAccessoryBtn" type="button">新增安裝維修保養項目</button>
      <button class="primary-button" id="saveSetBtn" type="submit" form="captureForm">完成</button>
    </div>
    <p class="status-text" id="captureStatus">請先選擇已 Check-in 車輛，再為該車加入安裝、維修或保養資料。</p>
  </footer>
</body>
</html>

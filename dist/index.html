<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FODA工場流程</title>
  <script src="./static/runtime-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script type="module" crossorigin src="./assets/home-CHWGH7ho.js"></script>
  <link rel="modulepreload" crossorigin href="./assets/workbench-D6gZtMOq.js">
  <link rel="stylesheet" crossorigin href="./assets/workbench-CZOKL--v.css">
</head>
<body class="page-home">
  <header class="topbar">
    <span class="back-link">FODA工場流程</span>
    <span class="account-pill" id="topUserBanner" hidden>使用帳號：<strong id="topUserEmail">-</strong></span>
  </header>
  <main class="shell">
    <section class="hero-block">
      <p class="eyebrow">FODA Workflow</p>
      <h1>FODA工場流程</h1>
    </section>

    <section class="home-login-wrap">
      <article class="surface-card auth-panel auth-panel-compact">
        <h2 id="authHeading">登入</h2>

        <form class="auth-form" id="loginForm" hidden>
          <div class="field">
            <label for="emailInput">Email</label>
            <input id="emailInput" type="email" placeholder="you@example.com" autocomplete="username">
          </div>
          <div class="auth-password-row">
            <div class="field">
              <label for="passwordInput">Password</label>
              <input id="passwordInput" type="password" placeholder="Password" autocomplete="current-password">
            </div>
            <button class="secondary-button login-inline-btn" id="loginBtn" type="submit">登入</button>
          </div>
        </form>

        <div class="home-entry-stack">
          <a class="primary-button home-capture-link" id="checkinLink" href="./checkin/">Check-in</a>
          <a class="warning-stripe-button home-capture-link warning-stripe-button-darktext" id="captureLink" href="./capture/"><span>安裝維修保養</span></a>
          <a class="primary-button home-capture-link" id="recordsLink" href="./records/">查看紀錄</a>
          <a class="secondary-button home-capture-link" id="checkoutLink" href="./checkout/">Check out</a>
        </div>

        <div class="toolbar-row" id="userPanel" hidden>
          <div class="signed-in-block">
            <p class="signed-in-label">已登入</p>
            <p class="signed-in-account">已登入帳號：<strong id="userEmail">-</strong></p>
          </div>
          <button class="secondary-button" id="logoutBtn" type="button">登出</button>
        </div>

        <p class="status-text" id="authStatus" hidden></p>
      </article>
    </section>

    <section class="home-secondary-action">
      <div class="home-entry-stack">
        <a class="secondary-button home-secondary-link" id="galleryLink" href="./gallery/">所有圖片庫</a>
        <a class="secondary-button home-secondary-link" id="usersLink" href="./users/">用戶管理</a>
        <a class="secondary-button home-secondary-link" id="editLink" href="./edit/">相片Edit</a>
      </div>
    </section>
  </main>
</body>
</html>

<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Garage Photo Workbench</title>
  <link rel="stylesheet" href="./static/theme.css">
  <script src="./static/runtime-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script type="module" src="./static/home.js"></script>
</head>
<body class="page-home">
  <main class="shell">
    <section class="hero-block">
      <p class="eyebrow">Garage Photo Workbench</p>
      <h1>車輛相片分類與調色工作台</h1>
    </section>

    <section class="home-login-wrap">
      <article class="surface-card auth-panel auth-panel-compact">
        <h2>登入</h2>

        <form class="auth-form" id="loginForm">
          <div class="field">
            <label for="emailInput">Email</label>
            <input id="emailInput" type="email" placeholder="you@example.com" autocomplete="username">
          </div>
          <div class="auth-password-row">
            <div class="field">
              <label for="passwordInput">Password</label>
              <input id="passwordInput" type="password" placeholder="Password" autocomplete="current-password">
            </div>
            <button class="secondary-button login-inline-btn" id="loginBtn" type="submit">登入</button>
          </div>
        </form>

        <a class="primary-button home-capture-link" href="./capture/">拍照</a>

        <div class="toolbar-row" id="userPanel" hidden>
          <div class="signed-in-block">
            <p class="signed-in-label">已登入</p>
            <span class="meta-chip">帳號：<strong id="userEmail">-</strong></span>
          </div>
          <button class="secondary-button" id="logoutBtn" type="button">登出</button>
        </div>

        <p class="status-text" id="authStatus" hidden></p>
      </article>
    </section>

    <section class="home-secondary-action">
      <a class="secondary-button home-secondary-link" href="./edit/">相片Edit</a>
    </section>
  </main>
</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-labelledby="title desc">
  <title id="title">相片已刪除</title>
  <desc id="desc">原始圖片找不到，顯示替代圖。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#2a2f36"/>
      <stop offset="100%" stop-color="#14181d"/>
    </linearGradient>
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M 64 0 L 0 0 0 64" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="1200" fill="url(#bg)"/>
  <rect width="1200" height="1200" fill="url(#grid)"/>
  <g transform="translate(600 470)">
    <rect x="-190" y="-150" width="380" height="300" rx="22" fill="rgba(255,255,255,0.05)" stroke="rgba(255,255,255,0.12)" stroke-width="18"/>
    <path d="M-120 80 L-30 -25 L55 55 L115 -10 L185 80" fill="none" stroke="#f3a13a" stroke-linecap="round" stroke-linejoin="round" stroke-width="34"/>
    <circle cx="-40" cy="-45" r="32" fill="#f3a13a"/>
    <path d="M120 -120 L-120 120" stroke="#ff7a7a" stroke-width="32" stroke-linecap="round"/>
  </g>
  <g fill="#f2f5f7" font-family="Avenir Next, Segoe UI, PingFang TC, Noto Sans TC, sans-serif" text-anchor="middle">
    <text x="600" y="760" font-size="86" font-weight="700">相片已刪除</text>
    <text x="600" y="845" font-size="42" fill="#c0c8cf">Object not found 時會以此替代圖顯示</text>
  </g>
</svg>
